# Default values for the per-customer SAMPLE-APP chart. ArgoCD passes
# customer-specific values via ``Application.spec.source.helm.values``
# (set by the coordinator at provision time); these defaults exist so
# ``helm template`` / lint validation works and so a developer can
# render the chart locally without coordinator wiring.

customer:
  slug: example
  orgId: "00000000-0000-0000-0000-000000000000"

env: uat   # uat | prod — drives label only; no behavior fork

# Online Boutique image overrides. Pinned to the upstream stable tag we
# tested with. Coordinator may patch ``imageTag`` on a per-customer
# basis later if we want chaos-of-source-of-truth scenarios; for the
# default beta path this stays on v0.9.0.
onlineBoutique:
  imageTag: v0.9.0
  registry: gcr.io/google-samples/microservices-demo

# Resource sizing per pod. Tuned for the CX42 (16GB ARM) cluster at
# ~5–7 active concurrent customers. Same values as the per-customer
# infra chart so a side-by-side comparison stays straightforward.
resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    memory: 192Mi

# Redis-cart gets its own block — Online Boutique's redis is the only
# stateful pod in the chart and gets a slightly higher floor for
# memory (in-memory cache).
redis:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 192Mi
