# =============================================================================
# 4/11 — cartservice (depends on redis-cart)
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    sureops.ai/component: online-boutique-cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
        {{- $labels | nindent 8 }}
    spec:
      volumes:
        {{- include "customer.otelDotnetVolume" . | nindent 8 }}
      initContainers:
        {{- include "customer.otelDotnetInitContainer" . | nindent 8 }}
      containers:
        - name: server
          image: {{ $registry }}/cartservice:{{ $imageTag }}
          ports:
            - containerPort: 7070
          volumeMounts:
            {{- include "customer.otelDotnetVolumeMount" . | nindent 12 }}
          env:
            - name: REDIS_ADDR
              value: "redis-cart:6379"
            {{- include "customer.otelEnv" . | nindent 12 }}
            {{- include "customer.otelDotnetEnv" . | nindent 12 }}
          # cartservice now starts the .NET CLR with the OTel
          # auto-instrumentation profiler attached (see customer.otelDotnetEnv).
          # Profiler load + IL rewriting on first method calls adds 15-30s
          # to the existing .NET startup, so the previous
          # ``initialDelaySeconds: 30`` is marginal — sometimes the gRPC
          # listener is up in time, sometimes not, and the frontend's gRPC
          # client cache surfaces transient "connection refused" errors on
          # the first page load (homeHandler → cartservice).
          #
          # startupProbe gates liveness+readiness for up to 2 minutes
          # (24 × 5s). Once it passes once, K8s switches to the regular
          # liveness/readiness cadence with no initial delay needed.
          startupProbe:
            grpc:
              port: 7070
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            grpc:
              port: 7070
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 7070
            periodSeconds: 10
          resources: {{- toYaml $resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
    - name: grpc
      port: 7070
      targetPort: 7070

