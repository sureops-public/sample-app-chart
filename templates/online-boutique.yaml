# =============================================================================
# 11/11 — redis-cart (cartservice's backing store; emptyDir on purpose — demo
#                     state is ephemeral, namespace teardown wipes everything)
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    sureops.ai/component: online-boutique-redis-cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cart
  template:
    metadata:
      labels:
        app: redis-cart
        {{- $labels | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            periodSeconds: 5
            tcpSocket:
              port: 6379
          livenessProbe:
            periodSeconds: 5
            tcpSocket:
              port: 6379
          volumeMounts:
            - mountPath: /data
              name: redis-data
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 192Mi
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: redis-cart
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
