# Online Boutique — Google's reference microservices demo (11 services).
# Source: https://github.com/GoogleCloudPlatform/microservices-demo
#         release/kubernetes-manifests.yaml (v0.9.x)
#
# We embed the manifests inline (templated) rather than pulling the
# upstream Kustomize so we can size pods aggressively for the beta
# cluster and inject our per-customer namespace + labels.
#
# All 11 services share the same image tag (var .Values.onlineBoutique.imageTag).
# Cluster's containerd cache is pre-pulled by the cloud-init bootstrap
# so first deploy is sub-5min.
#
# Inter-service discovery: every service is reachable via its bare DNS
# name within the same namespace (Kubernetes resolves `productcatalogservice`
# to the in-namespace ClusterIP automatically), so we never need fully
# qualified `.svc.cluster.local` here.
#
# Service-by-service summary (all in the customer namespace):
#   - frontend (HTTP :8080 → Service :80) — entry point, routed by ingress
#   - productcatalogservice    (gRPC :3550)
#   - currencyservice          (gRPC :7000)
#   - cartservice              (gRPC :7070)  → depends on redis-cart
#   - recommendationservice    (gRPC :8080)  → depends on productcatalogservice
#   - shippingservice          (gRPC :50051)
#   - emailservice             (gRPC container :8080, Service exposes :5000)
#   - checkoutservice          (gRPC :5050)  → depends on the above
#   - paymentservice           (gRPC :50051)
#   - adservice                (gRPC :9555)
#   - redis-cart               (Redis :6379) — single replica, emptyDir cache

{{- $ns := include "customer.namespace" . -}}
{{- $labels := include "customer.labels" . -}}
{{- $imageTag := .Values.onlineBoutique.imageTag -}}
{{- $registry := .Values.onlineBoutique.registry -}}
{{- $resources := .Values.resources -}}

# =============================================================================
# 1/11 — frontend (HTTP entry point)
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    sureops.ai/component: online-boutique-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        {{- $labels | nindent 8 }}
    spec:
      containers:
        - name: server
          image: {{ $registry }}/frontend:{{ $imageTag }}
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: ENABLE_PROFILER
              value: "0"
            {{- include "customer.otelEnv" . | nindent 12 }}
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /_healthz
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-readiness-probe
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /_healthz
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-liveness-probe
          resources: {{- toYaml $resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080

